name: Daily MX Gas Prices Scraper

# This trigger tells GitHub when to run the script
on:
  schedule:
    # Runs at 06:30 UTC every day (12:30 AM CST in Mexico)
    - cron: '30 6 * * *'
  # Allows you to click a button on GitHub to run it manually
  workflow_dispatch: 

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the repository files
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install Pandas and Requests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your Python script
      - name: Run Data Extraction
        run: python src/extract_and_save.py

      # 5. Commit and Push the updated CSV back to the repo
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historical_gas_prices.csv
          
          # Only commit if there are actually changes to avoid failing the pipeline
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data extraction: $(date +'%Y-%m-%d')" && git push)