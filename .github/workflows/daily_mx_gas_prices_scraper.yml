name: Daily MX Gas Prices Scraper

# This trigger tells GitHub when to run the script
on:
  schedule:
    # Runs at 06:30 UTC every day (12:30 AM CST in Mexico)
    - cron: '30 6 * * *'
  # Allows you to click a button on GitHub to run it manually
  workflow_dispatch: 

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the repository files
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Install uv and set up Python
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. Run your Python script (uv handles dependencies automatically)
      - name: Run Data Extraction
        run: uv run src/extract_and_save.py

      # 4. Commit and Push the updated CSV back to the repo
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/
          
          # Only commit if there are actually changes to avoid failing the pipeline
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data extraction: $(date +'%Y-%m-%d')" && git push)